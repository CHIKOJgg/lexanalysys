version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - lexanaliz-data:/app/data       # SQLite DB (persistent)
      - lexanaliz-cache:/app/backend    # LLM cache.json
    environment:
      - DB_PATH=/app/data/lexanaliz.db
      - SCRAPE_DELAY=2.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  lexanaliz-data:
  lexanaliz-cache: