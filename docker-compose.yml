version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lexanaliz-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite DB across container restarts
      - lexanaliz-data:/app/data
      # Optional: mount local cache.json for LLM response cache
      - lexanaliz-cache:/app/backend
    environment:
      - PORT=8000
      - DB_PATH=/app/data/lexanaliz.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  lexanaliz-data:
    driver: local
  lexanaliz-cache:
    driver: local